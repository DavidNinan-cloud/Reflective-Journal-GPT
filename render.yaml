services:
  - type: web
    name: logicmap-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0 # Match your local version
      - key: NOTION_TOKEN
        sync: false # Set this in Render dashboard
      - key: DATABASE_ID
        sync: false
      - key: DATABASE_URL
        sync: false